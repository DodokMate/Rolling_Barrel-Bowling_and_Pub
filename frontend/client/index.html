<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Dodok Máté, Galszter Márk">
    <meta name="description" content="Rolling Barrel - Bowling & Pub">
    <meta keywords="Rolling Barrel, Bowling, Pub, Bowling and Pub">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolling Barrel - Bowling & Pub</title>
    <!--BOOTSTRAP-->
    <link rel="stylesheet" href="./bootstrap/css/bootstrap.min.css" />
    <script src="./bootstrap/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="./bootstrap/bootstrap-icons-1.13.1/bootstrap-icons.min.css">
    <!--CSS-->
    <link rel="stylesheet" href="./css/main.css">
</head>

<body class="preload">
    <div id="headerNavbar">
        <!--Navbar generated with DOM-->
    </div>

    <div class="container-fluid">
        <!--HEADER-->
        <header id="header" class="">
            <div class="row" id="headerHero">
                <div class="col-12" id="headerHeroContent">
                    <h1 id="hero-title"><span id="titleSpan1">Rolling Barrel</span> <span id="titleSpan2">Bowling & Pub</span></h1>
                    <h2 id="hero-subtext">Fények, ritmus, lendület. Merülj el a Rolling Barrel neon világában.</h2>
                    <div id="hero-btn-group">
                        <button id="booking-ctab">Foglalj Most!</button>
                        <button id="prices-ctab">Árak</button>
                    </div>
                </div>

                <!-- <div id="arrow-div">
                    <span id="arrow-down-icon" class="bi bi-arrow-down"></span>
                </div> -->
            </div>
        </header>

        <!--MAIN CONTENT-->
        <main id="main-content">
            <!--Main content and menu dropdown menu sites generated with DOM-->
        </main>

        <div id="profile-container" class="d-none"></div>

        <!--FOOTER-->
        <footer id="footer">
            <!--Footer generated with DOM-->
        </footer>
    </div>

    <!--MODALS-->

    <!--Successful registration-->
    <div id="regMsgModal" class="modal fade" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title">Sikeres regisztráció!</h2>
                    <button type="button" id="regX" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
            </div>
        </div>
    </div>

    <!--Successful login-->
    <div id="loginMsgModal" class="modal fade" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title">Sikeres bejelentkezés!</h2>
                    <button type="button" id="loginX" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
            </div>
        </div>
    </div>

    <!--Session expired-->
    <div id="sessionExpModal" class="modal fade" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title">Munkamenet lejárt!</h2>
                    <button type="button" id="sessionExpX" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <p>Kijelentkeztettük, mert a munkamenet érvényessége lejárt.</p>
                </div>

                <div class="modal-footer">
                    <button type="button" id="sessionExpBtn">Bezárás</button>
                </div>
            </div>
        </div>
    </div>

    <!--Logout-->
    <div id="logoutMsgModal" class="modal fade" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title">Sikeres kijelentkezés!</h2>
                    <button type="button" id="logoutX" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
            </div>
        </div>
    </div>

    <!--JAVASCRIPT-->
    <script type="module" src="./js/main.js"></script>
</body>

</html>
